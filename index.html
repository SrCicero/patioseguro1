<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mr. C Soluções</title>

<style>

body{
background:#0f1117;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:30px;
}

button{
width:260px;
height:70px;
margin:10px;
font-size:18px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
}

button:hover{
background:#1d4ed8;
}

input,select{
width:260px;
height:40px;
margin:5px;
border-radius:8px;
border:none;
padding:5px;
}

.container{
margin-top:30px;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #333;
padding:10px;
}

th{
background:#1f2937;
}

</style>

</head>

<body>

<h1>Mr. C Soluções</h1>

<div class="container">

<input id="empresa" placeholder="Empresa atendida">

<br>

<button onclick="entrada()">ENTRADA</button>

<br>

<button onclick="saida()">SAÍDA</button>

<br>

<button onclick="verPatio()">VER PÁTIO</button>

<br>

<button onclick="relatorio()">RELATÓRIO</button>

</div>

<div id="tela"></div>

<script>

let patio = []

function entrada(){

let placaCavalo = prompt("Placa Cavalo (opcional)").toUpperCase()
let placaCarreta = prompt("Placa Carreta (opcional)").toUpperCase()

let motorista = prompt("Nome do motorista")

let tipo = prompt("Tipo veículo: cavalo / carreta / caminhão")

let patioLocal = prompt("Pátio: interno ou externo")

let step = confirm("Possui STEP?")

let data = new Date()

let registro = {

empresa:document.getElementById("empresa").value,

placaCavalo:placaCavalo,

placaCarreta:placaCarreta,

motorista:motorista,

tipo:tipo,

patio:patioLocal,

step:step ? "SIM" : "NÃO",

entrada:data.toLocaleString(),

saida:""

}

patio.push(registro)

alert("Entrada registrada")

}

function saida(){

let placa = prompt("Digite placa do cavalo ou carreta").toUpperCase()

let registro = patio.find(v =>
v.placaCavalo === placa || v.placaCarreta === placa
)

if(!registro){

alert("Veículo não encontrado")

return

}

if(confirm("Confirmar saída do veículo?")){

registro.saida = new Date().toLocaleString()

alert("Saída registrada")

}

}

function verPatio(){

let html = "<h2>Veículos no Pátio</h2>"

html += "<table>"

html += "<tr><th>Cavalo</th><th>Carreta</th><th>Motorista</th><th>Entrada</th></tr>"

patio.forEach(v => {

if(v.saida === ""){

html += "<tr>"

html += "<td>"+v.placaCavalo+"</td>"

html += "<td>"+v.placaCarreta+"</td>"

html += "<td>"+v.motorista+"</td>"

html += "<td>"+v.entrada+"</td>"

html += "</tr>"

}

})

html += "</table>"

document.getElementById("tela").innerHTML = html

}

function relatorio(){

let html = "<h2>Relatório</h2>"

html += "<table>"

html += "<tr><th>Cavalo</th><th>Carreta</th><th>Motorista</th><th>Tipo</th><th>STEP</th><th>Entrada</th><th>Saída</th></tr>"

patio.forEach(v => {

html += "<tr>"

html += "<td>"+v.placaCavalo+"</td>"

html += "<td>"+v.placaCarreta+"</td>"

html += "<td>"+v.motorista+"</td>"

html += "<td>"+v.tipo+"</td>"

html += "<td>"+v.step+"</td>"

html += "<td>"+v.entrada+"</td>"

html += "<td>"+v.saida+"</td>"

html += "</tr>"

})

html += "</table>"

html += "<br><button onclick='exportar()'>Exportar Excel</button>"

document.getElementById("tela").innerHTML = html

}

function exportar(){

let csv = "Cavalo,Carreta,Motorista,Tipo,Step,Entrada,Saida\n"

patio.forEach(v => {

csv += `${v.placaCavalo},${v.placaCarreta},${v.motorista},${v.tipo},${v.step},${v.entrada},${v.saida}\n`

})

let blob = new Blob([csv],{type:"text/csv"})

let a = document.createElement("a")

a.href = URL.createObjectURL(blob)

a.download = "relatorio_patio.csv"

a.click()

}

</script>

</body>

</html>

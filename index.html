<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mr. C Soluções - Sistema Profissional</title>

<style>
body{
  background:#0f1117;
  font-family:Arial;
  color:white;
  margin:0;
}

header{
  text-align:center;
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

input, select, button{
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th, td{
  border:1px solid #333;
  padding:8px;
  text-align:center;
}

th{
  background:#1f2937;
}

.card{
  background:#1a1d25;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

</style>
</head>

<body>

<header>Mr. C Soluções</header>

<div class="container">

<div class="card">
<h3>Entrada de Veículo</h3>
<input id="empresa" placeholder="Empresa">
<input id="cavalo" placeholder="Placa Cavalo">
<input id="carreta" placeholder="Placa Carreta">
<input id="motorista" placeholder="Motorista">

<select id="tipo">
<option value="">Tipo</option>
<option>Cavalo</option>
<option>Carreta</option>
<option>Caminhão</option>
</select>

<select id="patio">
<option value="">Pátio</option>
<option>Interno</option>
<option>Externo</option>
</select>

<select id="step">
<option value="">Possui STEP?</option>
<option>SIM</option>
<option>NÃO</option>
</select>

<button onclick="entrada()">Registrar Entrada</button>
</div>

<div class="card">
<h3>Saída de Veículo</h3>
<input id="buscar" placeholder="Digite placa">
<button onclick="saida()">Registrar Saída</button>
</div>

<div class="card">
<button onclick="verPatio()">Ver Pátio</button>
<button onclick="relatorio()">Relatório</button>
<button onclick="exportar()">Exportar CSV</button>
</div>

<div id="tela"></div>

</div>

<script>

let patio = JSON.parse(localStorage.getItem("patio")) || []

function salvar(){
  localStorage.setItem("patio", JSON.stringify(patio))
}

function entrada(){

let empresa = document.getElementById("empresa").value
let cavalo = document.getElementById("cavalo").value.toUpperCase()
let carreta = document.getElementById("carreta").value.toUpperCase()
let motorista = document.getElementById("motorista").value
let tipo = document.getElementById("tipo").value
let patioLocal = document.getElementById("patio").value
let step = document.getElementById("step").value

if(!empresa || !motorista || !tipo || !patioLocal){
  alert("Preencha os campos obrigatórios")
  return
}

let existe = patio.find(v => 
(v.cavalo === cavalo || v.carreta === carreta) && v.saida === "")

if(existe){
  alert("Veículo já está no pátio")
  return
}

let registro = {
empresa, cavalo, carreta, motorista, tipo, patio:patioLocal, step,
entrada:new Date().toLocaleString(),
saida:""
}

patio.push(registro)
salvar()
alert("Entrada registrada")
}

function saida(){
let placa = document.getElementById("buscar").value.toUpperCase()

let registro = patio.find(v =>
v.cavalo === placa || v.carreta === placa)

if(!registro){
  alert("Não encontrado")
  return
}

registro.saida = new Date().toLocaleString()
salvar()
alert("Saída registrada")
}

function verPatio(){

let html = "<h3>Veículos no Pátio</h3><table>"
html += "<tr><th>Cavalo</th><th>Carreta</th><th>Motorista</th><th>Tempo (h)</th></tr>"

patio.forEach(v => {
if(v.saida === ""){
let entrada = new Date(v.entrada)
let horas = Math.floor((new Date() - entrada)/3600000)

html += `<tr>
<td>${v.cavalo}</td>
<td>${v.carreta}</td>
<td>${v.motorista}</td>
<td>${horas}</td>
</tr>`
}
})

html += "</table>"

document.getElementById("tela").innerHTML = html
}

function relatorio(){

let html = "<h3>Relatório Completo</h3><table>"
html += "<tr><th>Empresa</th><th>Cavalo</th><th>Carreta</th><th>Motorista</th><th>Tipo</th><th>Pátio</th><th>STEP</th><th>Entrada</th><th>Saída</th></tr>"

patio.forEach(v => {
html += `<tr>
<td>${v.empresa}</td>
<td>${v.cavalo}</td>
<td>${v.carreta}</td>
<td>${v.motorista}</td>
<td>${v.tipo}</td>
<td>${v.patio}</td>
<td>${v.step}</td>
<td>${v.entrada}</td>
<td>${v.saida}</td>
</tr>`
})

html += "</table>"

document.getElementById("tela").innerHTML = html
}

function exportar(){
let csv = "Empresa,Cavalo,Carreta,Motorista,Tipo,Patio,Step,Entrada,Saida\n"

patio.forEach(v => {
csv += `${v.empresa},${v.cavalo},${v.carreta},${v.motorista},${v.tipo},${v.patio},${v.step},${v.entrada},${v.saida}\n`
})

let blob = new Blob([csv],{type:"text/csv"})
let a = document.createElement("a")

a.href = URL.createObjectURL(blob)
a.download = "relatorio_patio.csv"
a.click()
}

</script>

</body>
</html>
